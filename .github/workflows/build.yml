name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  # Production SignPath certificate issued 2026-05-12. Signing requests
  # against the release-signing policy require manual approval in the
  # SignPath UI, so the workflow will pause at the sign steps until
  # approved.
  SIGN_WINDOWS_VIA_SIGNPATH: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            cmake_flags: ""
            artifact_name: MonkSynth-VST3-Windows
          - os: macos-latest
            name: macOS
            cmake_flags: '-G Xcode -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DSMTG_AUDIOUNIT_SDK_PATH=/tmp/AudioUnitSDK-AudioUnitSDK-1.1.0 -DSMTG_CODE_SIGN_IDENTITY_MAC="-"'
            artifact_name: MonkSynth-VST3-macOS
          - os: ubuntu-22.04
            name: Linux
            cmake_flags: "-DCMAKE_BUILD_TYPE=Release -DMONKSYNTH_STATIC_LINUX_DEPS=ON -DMONKSYNTH_STATIC_PREFIX=/opt/monksynth-deps"
            artifact_name: MonkSynth-VST3-Linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcb1-dev libxcb-util-dev \
            libxcb-cursor-dev libxcb-keysyms1-dev libxcb-xkb-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libfontconfig1-dev \
            libcairo2-dev libgtkmm-3.0-dev libsqlite3-dev libxcb-util0-dev \
            libxcb-render0-dev libxcb-shm0-dev libxrender-dev \
            libexpat1-dev libpng-dev zlib1g-dev libbz2-dev \
            ninja-build python3-pip autoconf automake libtool

      - name: Cache static dependencies
        if: runner.os == 'Linux'
        id: cache-static-deps
        uses: actions/cache@v5
        with:
          path: /opt/monksynth-deps
          key: static-deps-${{ hashFiles('cpp/scripts/build-static-deps.sh') }}

      - name: Build static dependencies
        if: runner.os == 'Linux' && steps.cache-static-deps.outputs.cache-hit != 'true'
        run: |
          sudo cpp/scripts/build-static-deps.sh /opt/monksynth-deps

      - name: Install AudioUnit SDK (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -sL https://github.com/apple/AudioUnitSDK/archive/refs/tags/AudioUnitSDK-1.1.0.tar.gz -o /tmp/ausdk.tar.gz
          tar xzf /tmp/ausdk.tar.gz -C /tmp

      - name: Cache VST3 SDK
        uses: actions/cache@v5
        with:
          path: cpp/build/_deps
          key: vst3sdk-v3.8.0_build_66-${{ runner.os }}-${{ hashFiles('cpp/patches/*.patch') }}

      - name: Import code signing certificate
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PWD=$(openssl rand -hex 16)

          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          # Re-encode the .p12 with modern encryption (AES-256) so that
          # security import can handle all identities on newer macOS.
          # Use -legacy flag only if supported (OpenSSL 3.x).
          MODERN_P12=$RUNNER_TEMP/modern_certificate.p12
          LEGACY_FLAG=""
          if openssl pkcs12 -help 2>&1 | grep -q "\-legacy"; then
            LEGACY_FLAG="-legacy"
          fi
          openssl pkcs12 -in "$CERTIFICATE_PATH" -out "$RUNNER_TEMP/certs.pem" \
            -passin pass:"$MACOS_CERTIFICATE_PWD" -passout pass:"$MACOS_CERTIFICATE_PWD" $LEGACY_FLAG
          openssl pkcs12 -export -in "$RUNNER_TEMP/certs.pem" -out "$MODERN_P12" \
            -passin pass:"$MACOS_CERTIFICATE_PWD" -passout pass:"$MACOS_CERTIFICATE_PWD"
          rm "$RUNNER_TEMP/certs.pem"

          security create-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN_PATH

          security import $MODERN_P12 -P "$MACOS_CERTIFICATE_PWD" -A -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,productbuild: -k "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          echo "=== Codesigning identities ==="
          security find-identity -v -p codesigning
          echo "=== All valid identities ==="
          security find-identity -v

      - name: Extract version label
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            LABEL="${TAG#*-}"
            if [ "$LABEL" = "$TAG" ]; then LABEL="release"; fi
          else
            LABEL="dev"
          fi
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "Version label: $LABEL"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          SEMVER="${VERSION%%-*}"
          echo "number=$VERSION" >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "Version number: $VERSION"
          echo "Semver: $SEMVER"

      - name: Configure
        working-directory: cpp
        shell: bash
        run: |
          cmake -B build ${{ matrix.cmake_flags }} \
            -DMONKSYNTH_VERSION_LABEL="${{ steps.version.outputs.label }}" \
            -DMONKSYNTH_VERSION_NUMBER="${{ steps.version.outputs.semver }}"

      - name: Build VST3
        working-directory: cpp
        run: cmake --build build --config Release --target MonkSynth

      - name: Build and run DSP unit tests
        if: runner.os == 'Linux'
        working-directory: cpp
        run: |
          cmake -B build-tests -DMONKSYNTH_BUILD_TESTS=ON
          cmake --build build-tests --config Release
          ctest --test-dir build-tests --output-on-failure

      - name: Build AudioUnit
        if: runner.os == 'macOS'
        working-directory: cpp
        run: cmake --build build --config Release --target MonkSynth-au

      - name: Find VST3 bundle
        id: find_vst3
        shell: bash
        run: |
          VST3=$(find cpp/build -name "MonkSynth.vst3" -type d | head -1)
          echo "path=$VST3" >> "$GITHUB_OUTPUT"
          echo "Found VST3 at: $VST3"

      - name: Upload unsigned VST3 bundle (Windows)
        if: runner.os == 'Windows' && env.SIGN_WINDOWS_VIA_SIGNPATH == 'true'
        id: upload_vst3_unsigned
        uses: actions/upload-artifact@v7
        with:
          name: vst3-unsigned-windows
          path: ${{ steps.find_vst3.outputs.path }}
          if-no-files-found: error
          retention-days: 1

      - name: Sign VST3 with SignPath
        if: runner.os == 'Windows' && env.SIGN_WINDOWS_VIA_SIGNPATH == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: '998d67e2-a2e5-4daa-abae-4093c3c45fa7'
          project-slug: 'monksynth'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'initial'
          github-artifact-id: ${{ steps.upload_vst3_unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ${{ runner.temp }}/signed-vst3

      - name: Replace VST3 binary with signed version
        if: runner.os == 'Windows' && env.SIGN_WINDOWS_VIA_SIGNPATH == 'true'
        shell: bash
        run: |
          BUNDLE_PATH="${{ steps.find_vst3.outputs.path }}"
          cp "$RUNNER_TEMP/signed-vst3/Contents/x86_64-win/MonkSynth.vst3" \
             "$BUNDLE_PATH/Contents/x86_64-win/MonkSynth.vst3"

      - name: Find AU bundle
        if: runner.os == 'macOS'
        id: find_au
        shell: bash
        run: |
          AU=$(find cpp/build -name "MonkSynth.component" -type d | head -1)
          echo "path=$AU" >> "$GITHUB_OUTPUT"
          echo "Found AU at: $AU"

      - name: Verify Linux static linking
        if: runner.os == 'Linux'
        run: |
          PLUGIN_SO="${{ steps.find_vst3.outputs.path }}/Contents/x86_64-linux/MonkSynth.so"
          echo "=== Dynamic dependencies ==="
          ldd "$PLUGIN_SO"
          echo ""
          echo "=== Exported symbols ==="
          nm -D "$PLUGIN_SO" | grep " T " || true
          echo ""
          # Fail if any non-system shared libs are still dynamically linked
          if ldd "$PLUGIN_SO" | grep -qE "lib(cairo|pango|harfbuzz|fontconfig|glib|gobject|fribidi|pixman|xcb-cursor|xcb-util|xcb-keysyms|xkbcommon)"; then
            echo "::error::Plugin still dynamically links GUI libraries!"
            exit 1
          fi
          echo "Static linking verified."

      - name: Verify Linux load on common distros
        if: runner.os == 'Linux'
        run: |
          PLUGIN_SO="${{ steps.find_vst3.outputs.path }}/Contents/x86_64-linux/MonkSynth.so"
          cpp/scripts/verify-load-linux.sh "$PLUGIN_SO"

      - name: Run pluginval on Linux build
        if: runner.os == 'Linux'
        env:
          PLUGINVAL_VERSION: v1.0.4
        run: |
          # Need Xvfb because pluginval's editor tests embed an X11 window;
          # GitHub's Linux runners are headless so we render to memory.
          sudo apt-get install -y --no-install-recommends xvfb
          curl -fL --retry 5 --retry-delay 5 \
            -o pluginval.zip \
            "https://github.com/Tracktion/pluginval/releases/download/${PLUGINVAL_VERSION}/pluginval_Linux.zip"
          unzip -q pluginval.zip
          chmod +x pluginval
          # "Background thread state" hits a bug in pluginval's own
          # JUCE-based host adapter (juce::RunLoop::TimerCaller lifetime
          # around editor tear-down) that doesn't exist in real DAWs --
          # Bitwig/Reaper aren't JUCE-based. All other strictness-10
          # tests must pass. Note: pluginval requires an ABSOLUTE path
          # for --disabled-tests; relative paths are silently ignored.
          DISABLED="$PWD/pluginval-disabled.txt"
          echo "Background thread state" > "$DISABLED"
          xvfb-run -a ./pluginval \
            --strictness-level 10 \
            --disabled-tests "$DISABLED" \
            --validate "${{ steps.find_vst3.outputs.path }}"

      - name: Sign macOS bundles
        if: runner.os == 'macOS'
        run: |
          # Find the Developer ID Application certificate in the keychain
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Using identity: $IDENTITY"
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application certificate found in keychain"
            security find-identity -v -p codesigning
            exit 1
          fi

          echo "Signing VST3..."
          codesign --force --deep --sign "$IDENTITY" \
            --options runtime --timestamp \
            "${{ steps.find_vst3.outputs.path }}"

          # The AU bundle contains a symlink to the VST3 at
          # Contents/Resources/plugin.vst3.  Replace it with a real copy
          # so the AU is self-contained and its signature is valid.
          echo "Resolving AU plugin.vst3 symlink..."
          AU_RES="${{ steps.find_au.outputs.path }}/Contents/Resources"
          rm -f "$AU_RES/plugin.vst3"
          cp -R "${{ steps.find_vst3.outputs.path }}" "$AU_RES/plugin.vst3"

          echo "Signing AU..."
          codesign --force --deep --sign "$IDENTITY" \
            --options runtime --timestamp \
            "${{ steps.find_au.outputs.path }}"

          echo "=== VST3 signature ==="
          codesign -dvv "${{ steps.find_vst3.outputs.path }}"
          echo ""
          echo "=== AU signature ==="
          codesign -dvv "${{ steps.find_au.outputs.path }}"

      - name: Package VST3
        shell: bash
        run: |
          cd "$(dirname "${{ steps.find_vst3.outputs.path }}")"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            7z a -tzip "$GITHUB_WORKSPACE/${{ matrix.artifact_name }}.zip" "MonkSynth.vst3"
          else
            zip -r "$GITHUB_WORKSPACE/${{ matrix.artifact_name }}.zip" "MonkSynth.vst3"
          fi

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p installer/windows/staging/presets
          cp -r "${{ steps.find_vst3.outputs.path }}" installer/windows/staging/MonkSynth.vst3
          cp presets/*.vstpreset installer/windows/staging/presets/
          iscc //DMyAppVersion="${{ steps.version.outputs.number }}" installer/windows/MonkSynth.iss

      - name: Upload unsigned Windows installer
        if: runner.os == 'Windows' && env.SIGN_WINDOWS_VIA_SIGNPATH == 'true'
        id: upload_installer_unsigned
        uses: actions/upload-artifact@v7
        with:
          name: installer-unsigned-windows
          path: installer/windows/Output/*.exe
          if-no-files-found: error
          retention-days: 1

      - name: Sign Windows installer with SignPath
        if: runner.os == 'Windows' && env.SIGN_WINDOWS_VIA_SIGNPATH == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: '998d67e2-a2e5-4daa-abae-4093c3c45fa7'
          project-slug: 'monksynth'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'windows-installer'
          github-artifact-id: ${{ steps.upload_installer_unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ${{ runner.temp }}/signed-installer

      - name: Replace installer with signed version
        if: runner.os == 'Windows' && env.SIGN_WINDOWS_VIA_SIGNPATH == 'true'
        shell: bash
        run: |
          rm -f installer/windows/Output/*.exe
          cp "$RUNNER_TEMP"/signed-installer/*.exe installer/windows/Output/

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: MonkSynth-Windows-Setup
          path: installer/windows/Output/*.exe

      - name: Package AU
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd "$(dirname "${{ steps.find_au.outputs.path }}")"
          zip -r "$GITHUB_WORKSPACE/MonkSynth-AU-macOS.zip" "MonkSynth.component"

      - name: Notarize VST3
        if: runner.os == 'macOS'
        id: notarize_vst3
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          RESULT=$(xcrun notarytool submit "${{ matrix.artifact_name }}.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1)
          echo "$RESULT"
          ID=$(echo "$RESULT" | grep '  id:' | head -1 | awk '{print $2}')
          echo "submission_id=$ID" >> "$GITHUB_OUTPUT"

          if echo "$RESULT" | grep -q "status: Invalid"; then
            echo "::error::Notarization failed. Fetching log..."
            xcrun notarytool log "$ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
            exit 1
          fi

          cd "$(dirname "${{ steps.find_vst3.outputs.path }}")"
          xcrun stapler staple "MonkSynth.vst3"
          cd "$GITHUB_WORKSPACE"
          rm "${{ matrix.artifact_name }}.zip"
          cd "$(dirname "${{ steps.find_vst3.outputs.path }}")"
          zip -r "$GITHUB_WORKSPACE/${{ matrix.artifact_name }}.zip" "MonkSynth.vst3"

      - name: Notarize AU
        if: runner.os == 'macOS'
        id: notarize_au
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          RESULT=$(xcrun notarytool submit "MonkSynth-AU-macOS.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1)
          echo "$RESULT"
          ID=$(echo "$RESULT" | grep '  id:' | head -1 | awk '{print $2}')
          echo "submission_id=$ID" >> "$GITHUB_OUTPUT"

          if echo "$RESULT" | grep -q "status: Invalid"; then
            echo "::error::Notarization failed. Fetching log..."
            xcrun notarytool log "$ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
            exit 1
          fi

          cd "$(dirname "${{ steps.find_au.outputs.path }}")"
          xcrun stapler staple "MonkSynth.component"
          cd "$GITHUB_WORKSPACE"
          rm "MonkSynth-AU-macOS.zip"
          cd "$(dirname "${{ steps.find_au.outputs.path }}")"
          zip -r "$GITHUB_WORKSPACE/MonkSynth-AU-macOS.zip" "MonkSynth.component"

      - name: Build macOS installer
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          installer/macos/build-pkg.sh \
            "${{ steps.find_vst3.outputs.path }}" \
            "${{ steps.find_au.outputs.path }}" \
            "${{ steps.version.outputs.number }}" \
            "Developer ID Installer: Jonathan Taylor ($APPLE_TEAM_ID)"

          xcrun notarytool submit installer/macos/Output/*.pkg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple installer/macos/Output/*.pkg

      - name: Upload macOS installer
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: MonkSynth-macOS-Setup
          path: installer/macos/Output/*.pkg

      - name: Upload VST3
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip

      - name: Upload AU
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: MonkSynth-AU-macOS
          path: MonkSynth-AU-macOS.zip

      - name: Clean up keychain
        if: runner.os == 'macOS' && always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: CHANGELOG.md
          sparse-checkout-cone-mode: false

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Build release notes
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          # Extract the changelog section for this version
          awk -v ver="$TAG" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md > release_notes.md

          cat >> release_notes.md <<'EOF'

          ---

          ### Installation

          - **macOS (Installer):** Run the `.pkg` installer — installs both VST3 and AU plugins
          - **Windows (Installer):** Run the `.exe` installer — installs the VST3 plugin automatically
          - **macOS (Manual):** Extract VST3 to `~/Library/Audio/Plug-Ins/VST3/`, AU to `~/Library/Audio/Plug-Ins/Components/`
          - **Windows (Manual):** Extract and copy `MonkSynth.vst3` to `C:\Program Files\Common Files\VST3\`
          - **Linux (VST3):** Extract and copy to `~/.vst3/`

          ### Notes
          - Windows build is signed by [SignPath Foundation](https://signpath.org). The certificate is newly issued, so SmartScreen may still show a warning until reputation builds — click **More info** → **Run anyway** if so
          - macOS build is Universal (arm64 + x86_64), signed and notarized
          - Requires a DAW with VST3 support (or AU on macOS)
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          name: "MonkSynth ${{ github.ref_name }} (Beta)"
          body_path: release_notes.md
          files: |
            artifacts/MonkSynth-macOS-Setup/*.pkg
            artifacts/MonkSynth-Windows-Setup/*.exe
            artifacts/MonkSynth-VST3-Windows/*.zip
            artifacts/MonkSynth-VST3-macOS/*.zip
            artifacts/MonkSynth-AU-macOS/*.zip
            artifacts/MonkSynth-VST3-Linux/*.zip
